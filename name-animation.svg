<svg xmlns="http://www.w3.org/2000/svg" width="844" height="220" viewBox="0 0 844 220" role="img" aria-label="DEBASHISH - AI Engineer and Developer">
  <style>
    :root {
      color-scheme: dark;
    }

    .bg {
      fill: #0d1117;
    }

    .tile {
      animation: pop 3.6s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .dim {
      fill: #161b22;
      opacity: .42;
    }

    .name {
      fill: #f0f6fc;
      font: 800 58px/1 "Segoe UI", Arial, sans-serif;
      letter-spacing: 4px;
      animation: glow 3.6s ease-in-out infinite;
    }

    .sub {
      fill: #9be9a8;
      font: 700 18px/1.4 "Segoe UI", Arial, sans-serif;
      letter-spacing: 3px;
      animation: rise 3.6s ease-in-out infinite;
    }

    .line {
      stroke: #40c463;
      stroke-width: 2;
      stroke-linecap: round;
      opacity: .72;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: draw 3.6s ease-in-out infinite;
    }

    @keyframes pop {
      0%, 100% { opacity: .22; transform: scale(.82) rotate(-12deg); }
      42%, 72% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes glow {
      0%, 100% { opacity: .72; filter: drop-shadow(0 0 0 #40c463); }
      45%, 72% { opacity: 1; filter: drop-shadow(0 0 12px #2ea043); }
    }

    @keyframes rise {
      0%, 100% { opacity: .58; transform: translateY(6px); }
      45%, 72% { opacity: 1; transform: translateY(0); }
    }

    @keyframes draw {
      0%, 18% { stroke-dashoffset: 220; opacity: .2; }
      50%, 78% { stroke-dashoffset: 0; opacity: .86; }
      100% { stroke-dashoffset: 220; opacity: .2; }
    }
  </style>

  <rect class="bg" width="100%" height="100%" rx="10"/>

